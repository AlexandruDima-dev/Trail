<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trails- Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/Images/Normal Logo.png">
</head>

<style>

:root{
--bg:#0f0f0f;
--panel:#4e4e4e8a;
--accent:#556b2f;
--danger:#8b2f2f;
--text:aliceblue;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    background:url("Images/admin-pannel.jpg") center/cover no-repeat;
    color:var(--text);
}

.sidebar{
    width: 260px;
    background-color:#003b0f;
    height: 100vh;
    position: fixed;
    top:0;
    left: 0;
    padding:20px;
    display:flex;
    flex-direction:column;
    transition:0.3s;
}

sidebar{
    width:260px;
    background:#003b0f;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    padding:20px;
    display:flex;
    flex-direction:column;
    transition:0.3s;
}

.logo h2{margin-bottom:5px;}
.logo p{opacity:.7;font-size:13px;margin-bottom:20px;}

.nav-links{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.nav-links li{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

.nav-links li:hover,
.nav-links li.active{
    background:var(--accent);
    transform:translateX(4px);
}

.nav-links img{
    width:20px;
    height:20px;
}

.main-body{
    display: flex;
    flex-direction: column;
}

.add-trails{
    margin-left: 300px;
    background-color: #3b3b3ba9;
    backdrop-filter: blur(12px);
    outline: 2px solid #5c5c5c;
    border-radius: 20px;

    padding: 60px;
    margin-top: 30px;
    max-width: 900px;
}

.add-trails button{
    padding: 10px;
    border-radius: 30px;
    border: none;

    background-color: #556b2f;
    color: aliceblue;
    transition: all ease 0.3s;

}

.add-trails button:hover{
    background-color: #003b0f;
}

.button-con{
    display: flex;
    flex-direction: column;
    
}

@media(max-width: 768px){

    body{
        display: flex;
        flex-direction: column;
    }
   .add-trails{
    align-self: center;
    margin-left: 0px;
    margin-top: 90px;
   }
}



    


</style>
<body>

    <nav class="sidebar" id="sidebar">
    <div class="logo">
        <h2>Trail</h2>
        <p>Admin Panel</p>
    </div>

    <ul class="nav-links">
        <li onclick="getToDash()"><img src="/Icons/dashboard_icon.png"><span>Dashboard</span></li>
        <li><img src="/Icons/profile_icon.png"><span>Users</span></li>
        <li  class="active"><img src="/Icons/location_icon.png"><span>Trails</span></li>
        <li><img src="/Icons/warning_icon.png"><span>Reports</span></li>
        <li><img src="/Icons/settings_icon.png"><span>Settings</span></li>
    </ul>
</nav>


<div class="main-body">

    <div class="add-trails">
        <h2>Add New Trails.</h2><br>
        <div class="button-con">
            <button id="manual">Add Trails Manually</button><br>
            <button id="Ai">Add Trails using AI</button>
        </div>

    </div>
</div>
    
</body>
</html>
