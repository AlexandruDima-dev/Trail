<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/Images/Normal Logo.png">
<title>Trail Admin</title>

<style>
    body{
        display: flex;

        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: aliceblue;

        background-image: url("/Images/admin-pannel.jpg");
        background-position: center;
        background-repeat: no-repeat;
    }


    .sidebar{
        width: 250px;
        height: 100vh;
        background: #003b0f;
        color: white;

        display: flex;
        flex-direction: column;

        padding: 25px 15px;
        position: fixed;
        top: 0;
        left: 0;
    }


    .logo h2{
        margin: 0;
        font-size: 22px;
    }

    .logo p{
        margin: 5px 0 25px;
        font-size: 13px;
        opacity: 0.7;
    }


    .nav-links{
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .nav-links li{
        display: flex;
        align-items: center;
        gap: 12px;

        padding: 12px;
        margin-bottom: 10px;

        border-radius: 10px;
        cursor: pointer;

        transition: all 0.25s ease;
    }


    .nav-links img{
        width: 20px;
        height: 20px;
    }


    .nav-links li:hover{
        background: #556b2f;
        transform: translateX(5px);
    }


    .nav-links li.active{
        background: #556b2f;
    }



@media (max-width: 768px){

    .sidebar{
        width: 100%;
        height: 65px;

        flex-direction: row;
        align-items: center;
        justify-content: space-between;

        padding: 10px 15px;
        z-index: 100000;
    }

    /* Hide "Admin Panel" text */
    .logo p{
        display: none;
    }

    .logo h2{
        font-size: 18px;
    }

    .nav-links{
        margin-right: 20px;
    }

    /* Make nav horizontal */
    .nav-links{
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0;
    }

    .nav-links li{
        margin: 0;
        padding: 8px;
    }

    /* Hide text → icons only */
    .nav-links span{
        display: none;
    }

    /* Smaller icons */
    .nav-links img{
        width: 18px;
    }

    /* Remove slide animation */
    .nav-links li:hover{
        transform: none;
    }
}

/* Main Dashboard */

.main-container{
    margin-left: 350px; /* same as sidebar width */
    padding: 30px;
}

.title{
    font-size: 40px;
    font-weight: bolder;
}

.title-text{
    color: rgb(184, 184, 184);
    font-size: 20px;
    font-weight: bolder;
}




@media (max-width: 768px){
    .main-container{

        margin-left: 0;
        margin-top: 65px; /* pushes content below top nav */
    }
}


/* Stat Cards */

.stat-cards{
    display: grid;
    grid-template-columns: repeat(4, 1fr); 
    gap: 20px;
}

@media(max-width: 768px){
    .stat-cards{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;

    }
}

.stat-cards div{
    background-color: #4e4e4e8a;
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 14px;
    outline: 2px solid #666666;
}

/* CHART */
.chart-card{
    background: #4e4e4e8a;
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 20px;
    color: white;

    width: 100%;
    max-width: 100%; /* allow full width */

    outline: 2px solid #666666;
    margin-top: 50px;
}

/* Make canvas responsive */
.chart-card canvas{
    width: 100% !important;
    height: 300px !important;
}





</style>
</head>

<body>

<nav class="sidebar">
    <div class="logo">
        <h2>Trail</h2>
        <p>Admin Panel</p>
    </div>

    <ul class="nav-links">
        <li class="active">
            <img src="/Icons/dashboard_icon.png">
            <span>Dashboard</span>
        </li>

        <li onclick="goToUsers()">
            <img src="/Icons/profile_icon.png">
            <span>Users</span>
        </li>

        <li onclick="goToTrail()">
            <img src="/Icons/location_icon.png">
            <span>Trails</span>

        </li>

        <li>
            <img src="/Icons/warning_icon.png">
            <span>Reports</span>
        </li>

        <li>
            <img src="/Icons/settings_icon.png">
            <span>Settings</span>
        </li>
    </ul>
</nav>

<div id="main" class="main-container">

    <h2 class="title">Dashboard</h2>
    <p class="title-text">Wellcome back! Here's Whats happening today.</p>


    <div class="stat-cards">
        <div class="user-card">
            <h2>Total Users</h2>
            <p id="total">12,458</p>
            <img alt="Total-user-icon" src="/Icons/profile_icon.png" height="20px">
        </div>

        <div class="active-card">
            <h2>Active Users</h2>
            <p id="total-active"> 8,342</p>
            <img alt="Active-users-icon" src="/Icons/statistic_icon.png" height="20px">
        </div>

        <div class="total-trails">
            <h2>Total Trails</h2>
            <p id="trails-amount">1,247</p>
            <img alt="trails" src="/Icons/location_icon.png" height="20px">
        </div>

        <div class="popular-trail">
            <h2>Popular Trails</h2>
            <p id="name-trail">Mt. Hood</p>
            <img alt="icon-for-popular-trail" src="/Icons/statistic2_icon.png" height="20px" >
        </div>
    </div>


    <div class="chart-card">
        <h3>New Users Over Time</h3>
        <canvas id="userChart"></canvas>
    </div>


    <!-- JAVA SCRIPT-->


    <!-- ROUTEING  -->

    <script>
        function goToTrail(){
            windows.location.href = "/admin/trails"
        }
    </script>

    <script>
        function goToUsers(){
            window.location.href = "/admin/users"
        }
    </script>

    <!-- CHARTS -->
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
     <script>
        const ctx = document.getElementById('userChart').getContext('2d');

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Users',
                    data: [120, 180, 250, 310, 400, 500],
                    borderColor: '#8aa63f',
                    backgroundColor: 'rgba(138,166,63,0.2)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 5
                }]
            },
            options: {
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        ticks: { color: 'white' },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    },
                    y: {
                        ticks: { color: 'white' },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    }
                }
            }
        });
</script>
</div>

</body>
</html>
