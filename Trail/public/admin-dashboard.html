<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trail Admin</title>

<style>
    body{
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* SIDEBAR */
    .sidebar{
        width: 250px;
        height: 100vh;
        background: #003b0f;
        color: white;

        display: flex;
        flex-direction: column;

        padding: 25px 15px;
        position: fixed;
        top: 0;
        left: 0;
    }

    /* LOGO */
    .logo h2{
        margin: 0;
        font-size: 22px;
    }

    .logo p{
        margin: 5px 0 25px;
        font-size: 13px;
        opacity: 0.7;
    }

    /* NAV LINKS */
    .nav-links{
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .nav-links li{
        display: flex;
        align-items: center;
        gap: 12px;

        padding: 12px;
        margin-bottom: 10px;

        border-radius: 10px;
        cursor: pointer;

        transition: all 0.25s ease;
    }

    /* ICONS */
    .nav-links img{
        width: 20px;
        height: 20px;
    }

    /* HOVER */
    .nav-links li:hover{
        background: #556b2f;
        transform: translateX(5px);
    }

    /* ACTIVE */
    .nav-links li.active{
        background: #556b2f;
    }

</style>
</head>

<body>

<nav class="sidebar">
    <div class="logo">
        <h2>Trail</h2>
        <p>Admin Panel</p>
    </div>

    <ul class="nav-links">
        <li class="active">
            <img src="Icons/dashboard_icon.png">
            <span>Dashboard</span>
        </li>

        <li>
            <img src="Icons/profile_icon.png">
            <span>Users</span>
        </li>

        <li>
            <img src="Icons/warning_icon.png">
            <span>Reports</span>
        </li>

        <li>
            <img src="Icons/settings_icon.png">
            <span>Settings</span>
        </li>
    </ul>
</nav>

<div id="main" class="main-container">

    <h2>Dashboard</h2>
</div>

</body>
</html>
