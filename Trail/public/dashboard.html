<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trail</title>

<link rel="icon" href="Images/Normal Logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ================= THEME VARIABLES ================= */

/* LIGHT MODE */
:root {
  --bg-color: #f4f6f8;
  --text-color: #000;
  --navbar-color: #556b2f;
}

/* DARK MODE */
.dark-mode {
  --bg-color: #1a1a1a;
  --text-color: #ffffff;
  --navbar-color: #2f3b15;
}

/* APPLY THEME */
body{
  background: var(--bg-color);
  color: var(--text-color);
  transition: 0.3s;
}

/* ================= NAVBAR ================= */

.navbar {
  width: 100%;
  padding: 20px 40px;
  position: fixed;
  top: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--navbar-color);
  z-index: 10;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo h2{
  color: white;
  font-family: Verdana, Geneva, Tahoma, sans-serif;
  font-weight: bolder;
}

.logo img{
  width:40px;
}

.nav-links{
  display:flex;
  list-style:none;
  gap:20px;
}

.nav-links li a{
  color:white;
  text-decoration:none;
  font-weight:600;
}

/* Toggle Button */
#themeToggle{
  border:none;
  background:transparent;
  font-size:1.4rem;
  cursor:pointer;
  color:white;
}

/* ================= CAROUSEL ================= */

.container-images{
  margin-top:80px;
}

.carousel-item img{
  height:750px;
  object-fit:cover;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

<div class="logo">
  <h2>TRAIL</h2>
  <img src="Images/White Logo.png">
</div>

<ul class="nav-links">
  <li><a href="#">Login</a></li>
  <li><a href="#">Sign Up</a></li>
  <li><a href="#">Contact</a></li>
</ul>

<!-- DARK MODE BUTTON -->
<button id="themeToggle">🌙</button>

</nav>


<!-- HERO CAROUSEL -->
<div class="container-images">

<div id="trailCarousel" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-indicators">
  <button type="button" data-bs-target="#trailCarousel" data-bs-slide-to="0" class="active"></button>
  <button type="button" data-bs-target="#trailCarousel" data-bs-slide-to="1"></button>
  <button type="button" data-bs-target="#trailCarousel" data-bs-slide-to="2"></button>
</div>

<div class="carousel-inner">

  <div class="carousel-item active">
    <img src="Images/TRAIL.png" class="d-block w-100">
  </div>

  <div class="carousel-item">
    <img src="Images/EXPLORE SEASONAL TRAILS.png" class="d-block w-100">
  </div>

  <div class="carousel-item">
    <img src="Images/TRAIL (1).png" class="d-block w-100">
  </div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#trailCarousel" data-bs-slide="prev">
  <span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#trailCarousel" data-bs-slide="next">
  <span class="carousel-control-next-icon"></span>
</button>

</div>
</div>

<!-- ================= THEME SCRIPT ================= -->

<script>

const toggle = document.getElementById("themeToggle");

// Load saved theme
if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark-mode");
  toggle.textContent = "☀️";
}

toggle.addEventListener("click", () => {

  document.body.classList.toggle("dark-mode");

  if(document.body.classList.contains("dark-mode")){
      localStorage.setItem("theme","dark");
      toggle.textContent = "☀️";
  } else {
      localStorage.setItem("theme","light");
      toggle.textContent = "🌙";
  }

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
