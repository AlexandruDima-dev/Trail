<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trail Map</title>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial, sans-serif;
}

#sidebar {
    width: 320px;
    padding: 20px;
    background: #1f1f1f;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#sidebar img {
    width: 60px;
    margin-bottom: 10px;
}

#sidebar h2 {
    color: #00ff88;
}

#sidebar input {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: none;
    margin-bottom: 10px;
}

#sidebar button {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: none;
    background: #00ff88;
    font-weight: bold;
    cursor: pointer;
}

#map {
    flex: 1;
    position: relative;
}

.zoom-controls {
    position: absolute;
    bottom: 30px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 999;
}

.zoom-controls button {
    width: 50px;
    height: 50px;
    font-size: 24px;
    border-radius: 50%;
    border: none;
    background: #00ff88;
    font-weight: bold;
    cursor: pointer;
}

/* Responsive */
@media (max-width: 768px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; height: 200px; }
    #map { height: calc(100vh - 200px); }
}
</style>
</head>
<body>

<div id="sidebar">
    <img src="Images/Normal Logo.png" alt="Trail Logo">
    <h2>Find a Trail</h2>
    <input type="text" id="place-search" placeholder="Search a place...">
    <button id="search-btn">Search</button>
</div>

<div id="map">
    <div class="zoom-controls">
        <button id="zoom-in">+</button>
        <button id="zoom-out">−</button>
    </div>
</div>

<script>
mapboxgl.accessToken = "pk.eyJ1IjoiYWxleGFuZHJ1NjciLCJhIjoiY21sanpsdmxwMDUzazNnc2Rjd3Uza3dwYiJ9.pzrXdq5_DhfkrYdJXOt5uQ";

const map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/outdoors-v12",
    center: [0, 20],
    zoom: 2
});

/* Zoom Buttons */
document.getElementById("zoom-in").addEventListener("click", () => map.zoomIn());
document.getElementById("zoom-out").addEventListener("click", () => map.zoomOut());

let currentTrailLayers = [];

function clearTrails(){
    currentTrailLayers.forEach(id => {
        if(map.getLayer(id)) map.removeLayer(id);
        if(map.getSource(id)) map.removeSource(id);
    });
    currentTrailLayers = [];
}

function calculateDistance(coords){
    const R = 6371;
    let total = 0;
    for(let i = 1; i < coords.length; i++){
        const [lon1, lat1] = coords[i-1];
        const [lon2, lat2] = coords[i];
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(lat1*Math.PI/180) *
                  Math.cos(lat2*Math.PI/180) *
                  Math.sin(dLon/2)**2;
        total += 2 * 6371 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    return total;
}

function classifyDifficulty(distance){
    if(distance < 2) return "Beginner";
    if(distance < 7) return "Intermediate";
    return "Advanced";
}

function estimateTime(distance){
    return (distance / 4).toFixed(1);
}

async function fetchTrails(lat, lng){
    const radius = 75000; // 75km
    const query = `
    [out:json][timeout:40];
    (
      way["highway"~"path|footway|track|bridleway|steps"](around:${radius},${lat},${lng});
      relation["route"~"hiking|foot"](around:${radius},${lat},${lng});
    );
    out geom;
    `;
    const response = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: query });
    const data = await response.json();
    return data.elements;
}

function drawTrails(elements){
    elements.slice(0,120).forEach((el, index) => {
        if(!el.geometry) return;

        const coords = el.geometry.map(g => [g.lon, g.lat]);
        const distance = calculateDistance(coords);
        if(distance < 0.5) return;

        const difficulty = classifyDifficulty(distance);

        const geojson = { type: "Feature", geometry: { type: "LineString", coordinates: coords } };
        const baseId = `trail-${index}-${Date.now()}`;
        const outlineId = baseId + "-outline";

        map.addSource(baseId, { type: "geojson", data: geojson });

        /* Outline */
        map.addLayer({
            id: outlineId,
            type: "line",
            source: baseId,
            paint: { "line-color": "#000000", "line-width": 14, "line-opacity": 0.8 }
        });

        /* Main trail line */
        let color =
            difficulty === "Beginner" ? "#00ff00" :
            difficulty === "Intermediate" ? "#ffff00" :
            "#ff0033";

        map.addLayer({
            id: baseId,
            type: "line",
            source: baseId,
            paint: { "line-color": color, "line-width": 9, "line-opacity": 1 }
        });

        currentTrailLayers.push(baseId, outlineId);
    });
}

document.getElementById("search-btn").addEventListener("click", async () => {
    const place = document.getElementById("place-search").value;
    if(!place) return;

    const geoResponse = await fetch(
        `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(place)}.json?access_token=${mapboxgl.accessToken}`
    );

    const geoData = await geoResponse.json();
    if(!geoData.features.length){
        alert("Place not found");
        return;
    }

    const [lng, lat] = geoData.features[0].center;
    map.flyTo({ center: [lng, lat], zoom: 12 });

    clearTrails();
    const trails = await fetchTrails(lat, lng);
    drawTrails(trails);
});
</script>

</body>
</html>
