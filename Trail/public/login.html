<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login To Trail</title>
    <link rel="stylesheet" href="/style.css">
    <style>

        body {
        display: flex;
        flex-direction: column;
        background-image: url("/Images/login.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        }

        .navbar {
        width: 100%;
        padding: 20px 40px;
        position: fixed;
        top: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(0,0,0,0.5);
        z-index: 10;
        }

        .navbar .logo h2 {
        color: #fff;
        margin-right: 10px;
        }

        .navbar .nav-links {
        display: flex;
        list-style: none;
        gap: 20px;
        }

        .navbar .nav-links li a {
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        }

        .menu-toggle {
        display: none;
        font-size: 2rem;
        cursor: pointer;
        color: #fff;
        }

        .login{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-self: center;

            background-color: #2e7e00a2;
            margin-top: 200px;

            max-width: 400px;
            min-width: 300px;

            color: #fff;
            padding: 60px;
            border-radius: 14px;
            box-shadow: 0 10px 14px #000000;
            outline:2px solid #008b07;
        }

        .login input{
            border-radius: 6px;
            outline: none;
            border: none;
        }

        .login button{
            
        }

        

    </style>
</head>
<body>
    <nav class="navbar">
  <div class="logo">
      <h2>TRAIL</h2>
      <img alt="Logo" src="/Images/White Logo.png">
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="#">Login</a></li>
    <li><a href="#">Sign In</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

  <div class="menu-toggle" id="menuToggle">☰</div>
</nav>

<!-- MAIN BODY -->

<form id="form" action="/login" method="post" class="login">
    <h2>Start Your Journey</h2><br>
    <label>Email</label><br>
    <input id="email" type="email" name="email"><br>
    <label>Password</label><br>
    <input id="pass" type="password" name="password"><br><br>
    <button>Submit</button>
    <p id="message"></p>

</form>

    
</body>
</html>
